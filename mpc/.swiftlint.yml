# SwiftLint configuration — MPC iOS App
# Run: swiftlint lint --config mpc/.swiftlint.yml

included:
  - mpc

excluded:
  - mpcTests
  - mpcUITests
  - Resources

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - force_unwrapping
  - implicit_return
  - joined_default_parameter
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - operator_usage_whitespace
  - prefer_self_type_over_type_of_self
  - sorted_imports
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

disabled_rules:
  - trailing_whitespace          # formatter handles this
  - line_length                  # handled by formatter

analyzer_rules:
  - unused_import
  - unused_declaration

line_length:
  warning: 120
  error: 150
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 40
  error: 60

type_body_length:
  warning: 250
  error: 400

file_length:
  warning: 350
  error: 500

cyclomatic_complexity:
  warning: 10
  error: 20

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - x
    - y

type_name:
  min_length:
    warning: 3
  excluded:
    - URL

custom_rules:
  todo_without_issue:
    name: "TODO without GitHub issue"
    regex: "//\\s*TODO(?!\\(#\\d+\\))"
    message: "TODOs must reference a GitHub issue: // TODO(#N): description"
    severity: warning
